<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HerbAlly — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8faf8;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #16a34a; }
    p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
    .hint { font-size: 0.875rem; color: #999; }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #16a34a;
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
    }
    a:hover { background: #15803d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — any herb pages you've previously visited are still available from your browser cache.</p>
    <a href="/">Try Again</a>
    <p class="hint">Previously visited herb pages are available offline.</p>
  </div>
</body>
</html>
